name: microlearn
description: A micro‑learning Flutter app.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  get_it: ^7.2.0
  sqflite: ^2.3.0
  path_provider: ^2.1.2
  firebase_core: ^2.21.0
  firebase_auth: ^4.9.0
  cloud_firestore: ^4.17.5
  firebase_storage: ^11.5.0
  http: ^1.2.0
  flutter_local_notifications: ^15.0.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
